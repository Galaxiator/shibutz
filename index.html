<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>חמ״ל שיבוץ פלוגתי</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<style>

body{
background:#050505;
color:#19ff8a;
font-family:'Assistant',sans-serif;
margin:0;
}

header{
padding:14px 20px;
border-bottom:1px solid #033;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-size:20px;
margin:0;
letter-spacing:1px;
}

button{
background:#001a12;
border:1px solid #19ff8a;
color:#19ff8a;
padding:6px 12px;
cursor:pointer;
}

button:hover{
background:#19ff8a;
color:#000;
}

.container{
padding:15px;
}

.panel{
border:1px solid #033;
padding:10px;
margin-bottom:10px;
}

input,select{
background:#000;
border:1px solid #033;
color:#19ff8a;
padding:4px;
width:100%;
}

.grid{
display:grid;
grid-template-columns:260px 1fr;
gap:15px;
}

.calendar{
display:grid;
grid-template-columns:120px repeat(7,1fr);
border-top:1px solid #033;
}

.dayHeader{
text-align:center;
border-left:1px solid #033;
padding:6px;
font-weight:bold;
}

.timeCell{
border-left:1px solid #033;
border-bottom:1px solid #033;
padding:5px;
font-size:12px;
}

.dayCell{
border-left:1px solid #033;
border-bottom:1px solid #033;
padding:4px;
min-height:70px;
}

.mission{
border:1px solid #19ff8a;
margin:3px 0;
padding:3px;
font-size:12px;
}

.shift{
font-size:11px;
margin-top:2px;
border-top:1px dashed #033;
}

</style>
</head>

<body>

<header>

<h1>חמ״ל שיבוץ שבועי</h1>

<div>

<button onclick="exportCSV()">ייצוא</button>

</div>

</header>


<div class="container">

<div class="grid">

<!-- LEFT CONTROL PANEL -->

<div>

<div class="panel">

<h3>מחלקות</h3>

<input id="unitName" placeholder="שם מחלקה">

<input id="unitSize" type="number" placeholder="כמות">

<button onclick="addUnit()">הוסף</button>

<div id="units"></div>

</div>


<div class="panel">

<h3>חוקי מנוחה</h3>

<label>שעות מנוחה מינימליות</label>

<input id="restRule" type="number" value="4">

</div>


<div class="panel">

<h3>משימה חדשה</h3>

<input id="missionName" placeholder="שם משימה">

<label>יום</label>

<select id="missionDay">
<option value="0">ראשון</option>
<option value="1">שני</option>
<option value="2">שלישי</option>
<option value="3">רביעי</option>
<option value="4">חמישי</option>
<option value="5">שישי</option>
<option value="6">שבת</option>
</select>

<label>שעת התחלה</label>

<input id="startTime" type="time">

<label>משך משמרת (שעות)</label>

<input id="duration" type="number" value="4">

<label>מספר משמרות</label>

<input id="shiftCount" type="number" value="3">

<button onclick="createMission()">צור</button>

</div>

</div>


<!-- CALENDAR -->

<div>

<div class="calendar" id="calendar">

</div>

</div>

</div>

</div>


<script>

const days=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"]

let state={
units:[],
missions:[],
assignments:{}
}

function save(){

localStorage.setItem("opsState",JSON.stringify(state))
render()

}

function load(){

let s=localStorage.getItem("opsState")

if(s) state=JSON.parse(s)

}

function addUnit(){

let name=document.getElementById("unitName").value
let size=parseInt(document.getElementById("unitSize").value)

if(!name||!size)return

state.units.push({
id:"u"+Date.now(),
name,
size
})

document.getElementById("unitName").value=""
document.getElementById("unitSize").value=""

save()

}

function createMission(){

let name=document.getElementById("missionName").value
let day=parseInt(document.getElementById("missionDay").value)
let start=document.getElementById("startTime").value
let duration=parseInt(document.getElementById("duration").value)
let count=parseInt(document.getElementById("shiftCount").value)

if(!name)return

let shifts=[]

for(let i=0;i<count;i++){

let label=""

if(start){

let t=new Date("1970-01-01T"+start)

t.setHours(t.getHours()+duration*i)

let end=new Date(t)

end.setHours(end.getHours()+duration)

label=t.getHours().toString().padStart(2,'0')+
":00-"+end.getHours().toString().padStart(2,'0')+":00"

}else{

label="משמרת "+(i+1)

}

shifts.push({
id:"s"+Date.now()+i,
label,
req:2
})

}

state.missions.push({
id:"m"+Date.now(),
name,
day,
shifts
})

save()

}

function exportCSV(){

let csv="יום,משימה,משמרת\n"

state.missions.forEach(m=>{
m.shifts.forEach(s=>{
csv+=`${days[m.day]},${m.name},${s.label}\n`
})
})

let blob=new Blob([csv])
let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="schedule.csv"

link.click()

}

function render(){

document.getElementById("units").innerHTML=
state.units.map(u=>`<div>${u.name} (${u.size})</div>`).join("")

let cal=document.getElementById("calendar")

let html=""

html+="<div></div>"

days.forEach(d=>{
html+=`<div class="dayHeader">${d}</div>`
})

for(let r=0;r<1;r++){

html+=`<div class="timeCell">משימות</div>`

for(let d=0;d<7;d++){

let missions=state.missions.filter(m=>m.day==d)

html+=`<div class="dayCell">`

missions.forEach(m=>{

html+=`<div class="mission">${m.name}`

m.shifts.forEach(s=>{

html+=`<div class="shift">${s.label} | דרוש ${s.req}</div>`

})

html+="</div>"

})

html+="</div>"

}

}

cal.innerHTML=html

}

load()
render()

</script>

</body>
</html>
