<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת תכנון סד"כ פלוגתי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; color: #1f2937; font-family: system-ui, -apple-system, sans-serif; }
        .sidebar { width: 320px; border-left: 1px solid #e5e7eb; background: white; height: 100vh; position: fixed; right: 0; top: 0; padding: 20px; overflow-y: auto; }
        .main { margin-right: 320px; padding: 20px; }
        .mission-card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 15px; }
        .shift-row { display: grid; grid-template-columns: 1fr 100px 100px 100px 50px; gap: 10px; align-items: center; padding: 10px; border-bottom: 1px solid #f3f4f6; }
        .unit-badge { display: inline-flex; align-items: center; background: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 2px; }
        .conflict { color: #dc2626; font-weight: bold; font-size: 11px; }
        .avail-indicator { font-size: 24px; font-weight: 800; color: #059669; }
        input, select { border: 1px solid #d1d5db; border-radius: 4px; padding: 4px 8px; font-size: 13px; }
        .btn { padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-ghost { border: 1px solid #d1d5db; color: #4b5563; }
    </style>
</head>
<body>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxBPxQVbaXc9dfFp7oF9pMOTSTubJe7VgEfGNBJRbZaKwuTNp53nazEzvdv-hL03zIK/exec";
        let state = { units: [], missions: [], assignments: {} };
    </script>

    <div class="sidebar">
        <h2 class="text-xl font-bold mb-6 border-bottom pb-2 italic text-gray-400">ניהול סד"כ (מצבה)</h2>
        
        <div class="bg-gray-50 p-4 rounded-lg mb-6">
            <div class="space-y-3">
                <input id="uName" type="text" placeholder="שם מחלקה/צוות" class="w-full">
                <input id="uSize" type="number" placeholder="כמות לוחמים סהקה" class="w-full">
                <button onclick="addUnit()" class="btn btn-primary w-full text-sm">הוסף למצבה</button>
            </div>
        </div>

        <div id="unitStatusList" class="space-y-4">
            </div>
    </div>

    <div class="main">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-lg shadow-sm">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">תכנון משימות ולו"ז</h1>
                <p class="text-slate-500">ניהול שיבוץ פלוגתי חכם</p>
            </div>
            <div class="flex gap-4">
                <button onclick="sync(true)" class="btn btn-ghost">שמירה וסנכרון</button>
                <button onclick="exportSchedule()" class="btn btn-primary">ייצוא לו"ז לפרסום</button>
            </div>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-sm border-2 border-blue-100 mb-8">
            <h3 class="font-bold mb-4">יצירת משימה חדשה</h3>
            <div class="flex gap-4 mb-4">
                <input id="mName" type="text" placeholder="שם המשימה (לדוג' מארב צפוני)" class="flex-1 text-lg">
                <button onclick="addMissionRow()" class="btn btn-ghost text-sm">+ הוסף משמרת למשימה</button>
            </div>
            <div id="newMissionShifts" class="space-y-2 mb-4">
                </div>
            <button onclick="saveNewMission()" class="btn btn-primary w-full py-3">הוסף משימה ללוח התכנון</button>
        </div>

        <div id="planningBoard">
            </div>
    </div>

    <script>
        // Sync & Data
        async function sync(isPost = true) {
            try {
                if (isPost) {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(state) });
                } else {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    if (data.units) state = data;
                }
                render();
            } catch (e) { console.log("Sync Error"); }
        }

        // Logic
        function addUnit() {
            const name = document.getElementById('uName').value;
            const size = parseInt(document.getElementById('uSize').value);
            if (!name || !size) return;
            state.units.push({ id: 'u'+Date.now(), name, size });
            render();
        }

        let tempShifts = [];
        function addMissionRow() {
            const id = 'ts' + Date.now();
            tempShifts.push(id);
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex gap-3 items-center bg-gray-50 p-2 rounded";
            div.innerHTML = `
                <input type="date" class="shift-date w-36">
                <input type="time" class="shift-start" value="08:00">
                <input type="number" class="shift-dur w-20" placeholder="משך (ש')">
                <input type="number" class="shift-req w-20" placeholder="סדכ">
                <button onclick="this.parentElement.remove()" class="text-red-500 font-bold">✕</button>
            `;
            document.getElementById('newMissionShifts').appendChild(div);
        }

        function saveNewMission() {
            const name = document.getElementById('mName').value;
            if (!name) return;
            const rows = document.querySelectorAll('#newMissionShifts > div');
            let shifts = [];
            rows.forEach(row => {
                shifts.push({
                    id: 's' + Math.random().toString(36).substr(2, 9),
                    date: row.querySelector('.shift-date').value,
                    start: row.querySelector('.shift-start').value,
                    dur: row.querySelector('.shift-dur').value,
                    req: row.querySelector('.shift-req').value
                });
            });
            state.missions.push({ id: 'm'+Date.now(), name, shifts });
            document.getElementById('newMissionShifts').innerHTML = '';
            document.getElementById('mName').value = '';
            sync(true);
        }

        function assign(shiftId, unitId) {
            const unit = state.units.find(u => u.id === unitId);
            const count = prompt(`כמות לוחמים מ-${unit.name}:`, 2);
            if (!count) return;
            
            if (!state.assignments[shiftId]) state.assignments[shiftId] = [];
            state.assignments[shiftId].push({ unitId, name: unit.name, count: parseInt(count) });
            sync(true);
        }

        function render() {
            // Sidebar: Units Status
            document.getElementById('unitStatusList').innerHTML = state.units.map(u => {
                // Calculate current occupation
                let occupied = 0;
                Object.values(state.assignments).forEach(arr => {
                    arr.forEach(a => { if(a.unitId === u.id) occupied += a.count; });
                });
                const avail = u.size - occupied;
                return `
                    <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm relative group">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-lg">${u.name}</h4>
                                <p class="text-xs text-gray-400">סד"כ מלא: ${u.size}</p>
                            </div>
                            <div class="text-right">
                                <div class="avail-indicator ${avail <= 0 ? 'text-red-500' : 'text-emerald-600'}">${avail}</div>
                                <p class="text-[10px] uppercase font-bold text-gray-400">פנוי כרגע</p>
                            </div>
                        </div>
                        <div class="mt-3 flex flex-wrap gap-1">
                            <button draggable="true" ondragstart="event.dataTransfer.setData('uid', '${u.id}')" 
                                    class="bg-blue-600 text-white text-[10px] px-2 py-1 rounded w-full font-bold uppercase">גרור לשיבוץ</button>
                        </div>
                        <button onclick="removeUnit('${u.id}')" class="absolute top-1 left-1 opacity-0 group-hover:opacity-100 text-gray-300">✕</button>
                    </div>
                `;
            }).join('');

            // Planning Board: Missions
            document.getElementById('planningBoard').innerHTML = state.missions.map(m => `
                <div class="mission-card overflow-hidden">
                    <div class="bg-slate-800 text-white p-3 flex justify-between items-center">
                        <h3 class="font-bold uppercase tracking-tight">${m.name}</h3>
                        <button onclick="removeMission('${m.id}')" class="text-xs text-slate-400 hover:text-red-400">מחק משימה</button>
                    </div>
                    <div class="p-2">
                        <div class="grid grid-cols-6 text-[10px] font-bold text-gray-400 p-2 border-b">
                            <span>זמן (תאריך/שעה)</span>
                            <span>משך</span>
                            <span>סד"כ נדרש</span>
                            <span class="col-span-2">לוחמים משובצים</span>
                            <span>פעולות</span>
                        </div>
                        ${m.shifts.map(s => {
                            const assigned = state.assignments[s.id] || [];
                            const totalS = assigned.reduce((sum, a) => sum + a.count, 0);
                            const isUnder = totalS < s.req;
                            return `
                                <div class="grid grid-cols-6 gap-2 p-3 items-center border-b last:border-0 hover:bg-gray-50 transition"
                                     ondrop="event.preventDefault(); assign('${s.id}', event.dataTransfer.getData('uid'))" 
                                     ondragover="event.preventDefault(); this.classList.add('bg-blue-50')"
                                     ondragleave="this.classList.remove('bg-blue-50')">
                                    <div class="text-sm font-semibold">${s.date} <span class="text-blue-600 ml-1">${s.start}</span></div>
                                    <div class="text-xs">${s.dur} שעות</div>
                                    <div class="font-bold ${isUnder ? 'text-red-500' : 'text-emerald-600'}">${totalS} / ${s.req}</div>
                                    <div class="col-span-2 flex flex-wrap gap-1">
                                        ${assigned.map(a => `
                                            <div class="unit-badge">${a.name} (${a.count}) <span class="ml-1 cursor-pointer hover:text-red-500" onclick="unassign('${s.id}', '${a.unitId}')">✕</span></div>
                                        `).join('')}
                                        ${assigned.length === 0 ? '<span class="text-gray-300 italic text-[10px]">גרור מחלקה לכאן...</span>' : ''}
                                    </div>
                                    <button onclick="assign('${s.id}', '')" class="text-blue-500 text-[10px] font-bold">+ הוסף ידנית</button>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function removeUnit(id) { state.units = state.units.filter(u => u.id !== id); sync(true); }
        function removeMission(id) { state.missions = state.missions.filter(m => m.id !== id); sync(true); }
        function unassign(sId, uId) { state.assignments[sId] = state.assignments[sId].filter(a => a.unitId !== uId); sync(true); }

        function exportSchedule() {
            window.print();
        }

        sync(false);
    </script>
</body>
</html>
