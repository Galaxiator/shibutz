<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARES TACTICAL | C2 DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Assistant:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --dim: #004411; --bg: #050505; --panel: #0f0f0f; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: #ccc; margin: 0; height: 100vh; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Layout */
        .grid-layout { display: grid; grid-template-columns: 350px 1fr; grid-template-rows: 100px 1fr; height: 100vh; }
        .header { grid-column: 1 / 3; border-bottom: 1px solid #222; background: #000; }
        .sidebar { border-left: 1px solid #222; background: var(--panel); overflow-y: auto; }
        .main-content { overflow-y: auto; padding: 20px; position: relative; }

        /* Tactical UI */
        .stat-card { border-right: 3px solid var(--neon); background: #0a0a0a; padding: 10px 20px; }
        .unit-card { background: #121212; border: 1px solid #222; transition: all 0.2s; }
        .unit-card:hover { border-color: var(--neon); }
        .btn-tactical { background: var(--neon); color: #000; font-weight: 900; text-transform: uppercase; padding: 8px 16px; font-size: 12px; cursor: pointer; }
        
        /* Timeline */
        .timeline-wrapper { position: relative; border: 1px solid #222; background: #080808; margin-top: 20px; }
        .time-header { display: grid; grid-template-columns: 150px repeat(24, 1fr); background: #111; border-bottom: 1px solid #333; }
        .time-slot { height: 40px; border-right: 1px solid #222; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555; font-family: 'JetBrains Mono'; }
        .mission-row { display: grid; grid-template-columns: 150px 1fr; border-bottom: 1px solid #222; min-height: 60px; position: relative; }
        .mission-info { background: #0a0a0a; border-left: 1px solid #333; padding: 10px; font-weight: bold; font-size: 13px; color: var(--neon); }
        .mission-track { position: relative; background: rgba(255,255,255,0.02); }
        .mission-bar { position: absolute; top: 10px; height: 40px; background: rgba(0, 255, 65, 0.1); border: 1px solid var(--neon); border-radius: 2px; color: var(--neon); font-size: 11px; padding: 5px; cursor: pointer; overflow: hidden; }
        
        .drop-zone.over { background: rgba(0,255,65,0.05); }
        input { background: #000 !important; border: 1px solid #333 !important; color: var(--neon) !important; font-family: 'JetBrains Mono'; outline: none; padding: 5px; }
    </style>
</head>
<body>

    <div class="grid-layout">
        <div class="header flex items-center justify-between px-8">
            <div class="flex items-center gap-6">
                <h1 class="text-3xl font-black italic tracking-tighter text-white">ARES <span class="text-[#00ff41]">C2</span></h1>
                <div class="h-10 w-[1px] bg-gray-800"></div>
                <div class="flex gap-8">
                    <div class="stat-card"><p class="text-[9px] uppercase mono text-gray-500">סה"כ סד"כ</p><div id="statTotal" class="text-2xl font-bold mono">00</div></div>
                    <div class="stat-card"><p class="text-[9px] uppercase mono text-gray-500">במשימה</p><div id="statActive" class="text-2xl font-bold mono text-blue-400">00</div></div>
                    <div class="stat-card"><p class="text-[9px] uppercase mono text-gray-500">זמין כרגע</p><div id="statAvail" class="text-2xl font-bold mono text-white">00</div></div>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="sync(true)" class="border border-green-900 text-green-900 px-4 py-2 text-[10px] mono hover:border-green-500 hover:text-green-500 transition">PUSH_DATA</button>
            </div>
        </div>

        <div class="sidebar p-4 space-y-6">
            <div>
                <h2 class="text-xs font-black uppercase tracking-widest text-gray-500 mb-4">// ניהול מצבה</h2>
                <div class="flex flex-col gap-2 mb-4">
                    <input id="uName" type="text" placeholder="שם מחלקה" class="text-sm">
                    <input id="uSize" type="number" placeholder="סד"כ" class="text-sm">
                    <button onclick="addUnit()" class="btn-tactical w-full">הוסף כוח</button>
                </div>
                <div id="unitContainer" class="space-y-3"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="bg-[#111] p-4 border border-gray-800 flex gap-4 items-end rounded">
                <div class="flex-1"><label class="text-[10px] block mb-1 text-gray-600">שם משימה</label><input id="tName" type="text" class="w-full"></div>
                <div><label class="text-[10px] block mb-1 text-gray-600">התחלה</label><input id="tStart" type="time" value="08:00"></div>
                <div><label class="text-[10px] block mb-1 text-gray-600">משך (ש')</label><input id="tDur" type="number" value="4" class="w-16"></div>
                <div><label class="text-[10px] block mb-1 text-gray-600">משמרות</label><input id="tCount" type="number" value="3" class="w-16"></div>
                <button onclick="createTask()" class="btn-tactical px-8 h-[34px]">צור משימה</button>
            </div>

            <div class="timeline-wrapper">
                <div id="timelineHeader" class="time-header">
                    <div class="time-slot font-bold">משימה / שעה</div>
                    </div>
                <div id="timelineBody"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxBPxQVbaXc9dfFp7oF9pMOTSTubJe7VgEfGNBJRbZaKwuTNp53nazEzvdv-hL03zIK/exec";
        let state = { units: [], tasks: [], assignments: {} };

        // Core Sync
        async function sync(isPost = true) {
            try {
                if (isPost) {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(state) });
                } else {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    if (data.units) state = data;
                }
                render();
            } catch (e) { console.error("Link Error"); }
        }

        // Logic
        function addUnit() {
            const name = document.getElementById('uName').value;
            const size = parseInt(document.getElementById('uSize').value);
            if (!name || !size) return;
            state.units.push({ id: 'u'+Date.now(), name, size });
            sync(true);
        }

        function createTask() {
            const name = document.getElementById('tName').value;
            const [h, m] = document.getElementById('tStart').value.split(':').map(Number);
            const duration = parseInt(document.getElementById('tDur').value);
            const count = parseInt(document.getElementById('tCount').value);
            if (!name) return;

            let shifts = [];
            for (let i = 0; i < count; i++) {
                let sH = (h + (i * duration)) % 24;
                shifts.push({ id: 's'+Date.now()+i, label: name, start: sH, dur: duration, req: 2 });
            }
            state.tasks.push({ id: 't'+Date.now(), name, shifts });
            sync(true);
        }

        // Drag & Drop
        function drag(ev, id) { ev.dataTransfer.setData("uid", id); }
        function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('over'); }
        function drop(ev, sid) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('over');
            const uid = ev.dataTransfer.getData("uid");
            const unit = state.units.find(u => u.id === uid);
            const count = prompt(`כמות מתוך ${unit.name} (זמין: ${unit.size}):`, 2);
            if (count) {
                if (!state.assignments[sid]) state.assignments[sid] = [];
                state.assignments[sid].push({ uid, name: unit.name, count: parseInt(count) });
                sync(true);
            }
        }

        function render() {
            // Render HUD
            const total = state.units.reduce((s, u) => s + u.size, 0);
            let active = 0;
            Object.values(state.assignments).forEach(v => v.forEach(a => active += a.count));
            document.getElementById('statTotal').innerText = total;
            document.getElementById('statActive').innerText = active;
            document.getElementById('statAvail').innerText = total - active;

            // Render Sidebar Units
            document.getElementById('unitContainer').innerHTML = state.units.map(u => `
                <div class="unit-card p-3 rounded" draggable="true" ondragstart="drag(event, '${u.id}')">
                    <div class="flex justify-between text-xs font-bold mb-1">
                        <span class="text-white">${u.name}</span>
                        <span class="text-gray-500">${u.size} לוחמים</span>
                    </div>
                    <div class="w-full h-1 bg-gray-800 rounded-full overflow-hidden">
                        <div class="h-full bg-green-500" style="width: 100%"></div>
                    </div>
                    <p class="text-[9px] mt-2 text-gray-600 mono uppercase italic text-left">Click & Drag to assign</p>
                </div>
            `).join('');

            // Render Timeline Hours (Fixed the leak!)
            let hoursHtml = '<div class="time-slot font-bold">משימה / שעה</div>';
            for(let i=0; i<24; i++) hoursHtml += `<div class="time-slot">${String(i).padStart(2,'0')}:00</div>`;
            document.getElementById('timelineHeader').innerHTML = hoursHtml;

            // Render Mission Rows
            document.getElementById('timelineBody').innerHTML = state.tasks.map(t => `
                <div class="mission-row">
                    <div class="mission-info flex flex-col justify-center">
                        <span>${t.name}</span>
                        <button onclick="removeTask('${t.id}')" class="text-[8px] text-gray-600 hover:text-red-500 text-right">REMOVE</button>
                    </div>
                    <div class="mission-track">
                        ${t.shifts.map(s => {
                            const assigned = state.assignments[s.id] || [];
                            const current = assigned.reduce((sum, a) => sum + a.count, 0);
                            const left = (s.start / 24) * 100;
                            const width = (s.dur / 24) * 100;
                            return `
                                <div class="mission-bar drop-zone" ondrop="drop(event, '${s.id}')" ondragover="allowDrop(event)" 
                                     style="left: ${left}%; width: ${width}%">
                                    <div class="flex justify-between items-center text-[9px] font-bold">
                                        <span>${current}/${s.req}</span>
                                        <span class="truncate ml-1">${assigned.map(a => a.name).join(', ')}</span>
                                    </div>
                                    <div class="absolute bottom-0 left-0 h-[2px] bg-green-500" style="width: ${Math.min(100, (current/s.req)*100)}%"></div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function removeTask(id) { state.tasks = state.tasks.filter(t => t.id !== id); sync(true); }
        
        // Init
        sync(false);
        setInterval(() => sync(false), 20000);
    </script>
</body>
</html>
