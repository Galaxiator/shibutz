<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL COMMAND | PLATOON OPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --tactical-green: #22c55e; --tactical-red: #ef4444; --bg-black: #050505; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg-black); color: #e2e8f0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .deftech-border { border: 1px solid rgba(34, 197, 94, 0.3); }
        .deftech-card { background: #0a0a0a; border-left: 4px solid var(--tactical-green); }
        .drop-zone.over { background: rgba(34, 197, 94, 0.1) !important; border: 1px dashed var(--tactical-green); }
        .rest-warning { border-left: 4px solid var(--tactical-red) !important; color: var(--tactical-red); }
        input, select { background: #121212 !important; border: 1px solid #333 !important; color: var(--tactical-green) !important; outline: none; }
        input:focus { border-color: var(--tactical-green) !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--tactical-green); }
    </style>
</head>
<body class="p-4 lg:p-6">

    <script>
        // הלינק של ה-DB שלך מוטמע כאן
        const API_URL = "https://script.google.com/macros/s/AKfycbxBPxQVbaXc9dfFp7oF9pMOTSTubJe7VgEfGNBJRbZaKwuTNp53nazEzvdv-hL03zIK/exec";
    </script>

    <div class="max-w-[1800px] mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-green-900/50 pb-4">
            <div>
                <h1 class="text-2xl font-black mono tracking-tighter text-green-500 italic uppercase">Platoon Command // v3.0</h1>
                <div id="connectionStatus" class="text-[10px] mono text-green-800 uppercase flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span> Data Link Active
                </div>
            </div>
            <div class="flex gap-4 mt-4 md:mt-0">
                <button onclick="printMode()" class="bg-white text-black px-4 py-1 text-xs font-bold uppercase hover:bg-green-500 transition">לו"ז להפצה</button>
                <button onclick="sync(true)" class="border border-green-500 text-green-500 px-4 py-1 text-xs font-bold uppercase hover:bg-green-900/30">Force Sync</button>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-6">
            
            <div class="col-span-12 lg:col-span-3 space-y-6">
                <div class="deftech-card p-4">
                    <h2 class="text-xs font-bold mono text-green-500 mb-4 uppercase tracking-widest">// הגדרת סד"כ</h2>
                    <div class="space-y-2">
                        <input id="uName" type="text" placeholder="שם מחלקה" class="w-full p-2 text-sm">
                        <input id="uSize" type="number" placeholder="כמות" class="w-full p-2 text-sm">
                        <button onclick="addUnit()" class="w-full bg-green-600/20 border border-green-500 text-green-500 p-2 text-xs font-bold hover:bg-green-600 hover:text-white transition">הוסף למצבה</button>
                    </div>
                    <div id="unitList" class="mt-4 space-y-2 overflow-y-auto max-h-[300px]"></div>
                </div>

                <div class="deftech-card p-4 border-l-blue-500">
                    <h2 class="text-xs font-bold mono text-blue-500 mb-4 uppercase tracking-widest">// בנק לוחמים לגרירה</h2>
                    <div id="unitBank" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="bg-red-950/20 p-4 border border-red-900/50 rounded">
                    <h3 class="text-[10px] font-bold text-red-500 uppercase mb-2">מגבלת מנוחה (שעות)</h3>
                    <input id="minRest" type="number" value="4" onchange="state.settings.minRest=this.value; render();" class="w-full p-1 text-xs">
                </div>
            </div>

            <div class="col-span-12 lg:col-span-9 space-y-6">
                <div class="bg-[#111] p-4 deftech-border flex flex-wrap gap-4 items-end">
                    <div class="flex-1">
                        <label class="text-[10px] uppercase text-gray-500 block mb-1">שם משימה</label>
                        <input id="tName" type="text" class="w-full p-2 text-sm" placeholder="לדוג': מחסום צפוני">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-gray-500 block mb-1">התחלה</label>
                        <input id="tStart" type="time" value="08:00" class="w-full p-2 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-gray-500 block mb-1">משמרות</label>
                        <input id="tCount" type="number" value="3" class="w-full p-2 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-gray-500 block mb-1">משך (ש')</label>
                        <input id="tDuration" type="number" value="4" class="w-full p-2 text-sm">
                    </div>
                    <button onclick="createTask()" class="bg-green-500 text-black px-6 py-2 text-sm font-bold uppercase hover:bg-green-400">צור משימה</button>
                </div>

                <div id="missionBoard" class="grid grid-cols-1 xl:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        let state = { units: [], tasks: [], assignments: {}, settings: { minRest: 4 } };

        async function sync(isPost = true) {
            document.getElementById('connectionStatus').classList.add('animate-pulse');
            try {
                if (isPost) {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(state) });
                } else {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    if (data.units) state = data;
                }
            } catch (e) { console.log("Sync Check"); }
            document.getElementById('connectionStatus').classList.remove('animate-pulse');
            render();
        }

        function addUnit() {
            const name = document.getElementById('uName').value;
            const size = parseInt(document.getElementById('uSize').value);
            if (!name || !size) return;
            state.units.push({ id: 'u'+Date.now(), name, size });
            sync(true);
        }

        function createTask() {
            const name = document.getElementById('tName').value;
            const startStr = document.getElementById('tStart').value;
            const duration = parseInt(document.getElementById('tDuration').value);
            const count = parseInt(document.getElementById('tCount').value);
            if (!name) return;

            let shifts = [];
            let [h, m] = startStr.split(':').map(Number);
            for (let i = 0; i < count; i++) {
                let sH = (h + (i * duration)) % 24;
                let eH = (sH + duration) % 24;
                shifts.push({
                    id: 's' + Date.now() + i,
                    label: `${sH.toString().padStart(2,'0')}:00 - ${eH.toString().padStart(2,'0')}:00`,
                    req: 2,
                    startHour: sH
                });
            }
            state.tasks.push({ id: 't'+Date.now(), name, shifts });
            sync(true);
        }

        function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('over'); }
        function dragLeave(ev) { ev.currentTarget.classList.remove('over'); }
        function drag(ev, unitId) { ev.dataTransfer.setData("unitId", unitId); }

        function drop(ev, shiftId) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('over');
            const unitId = ev.dataTransfer.getData("unitId");
            const unit = state.units.find(u => u.id === unitId);
            const count = prompt(`סד"כ מתוך ${unit.name} (זמין: ${unit.size}):`, 2);
            if (count) {
                if (!state.assignments[shiftId]) state.assignments[shiftId] = [];
                state.assignments[shiftId].push({ unitId, name: unit.name, count: parseInt(count) });
                sync(true);
            }
        }

        function render() {
            // Units Column
            document.getElementById('unitList').innerHTML = state.units.map(u => `
                <div class="flex justify-between items-center bg-[#1a1a1a] p-2 border border-gray-800 rounded">
                    <span class="text-xs mono uppercase">${u.name} [${u.size}]</span>
                    <button onclick="removeUnit('${u.id}')" class="text-red-900 hover:text-red-500">✕</button>
                </div>
            `).join('');

            // Bank
            document.getElementById('unitBank').innerHTML = state.units.map(u => `
                <div draggable="true" ondragstart="drag(event, '${u.id}')" 
                     class="bg-green-950/30 border border-green-500 text-green-500 px-3 py-1 text-[10px] mono font-bold cursor-grab uppercase">
                    ${u.name}
                </div>
            `).join('');

            // Missions
            document.getElementById('missionBoard').innerHTML = state.tasks.map(t => `
                <div class="bg-[#0a0a0a] border border-gray-800 rounded-lg overflow-hidden">
                    <div class="bg-gray-900/50 p-3 border-b border-gray-800 flex justify-between items-center">
                        <span class="mono text-xs font-bold text-green-500 tracking-tighter uppercase">// MISSION: ${t.name}</span>
                        <button onclick="removeTask('${t.id}')" class="text-[9px] text-gray-600 hover:text-red-500 uppercase">Terminate</button>
                    </div>
                    <div class="p-3 grid grid-cols-1 gap-2">
                        ${t.shifts.map(s => {
                            const assigned = state.assignments[s.id] || [];
                            const total = assigned.reduce((sum, a) => sum + a.count, 0);
                            const isUnder = total < s.req;
                            return `
                                <div class="bg-[#121212] p-2 border border-gray-800 relative">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="mono text-[10px] text-gray-400">${s.label}</span>
                                        <div class="flex items-center gap-2">
                                            <span class="text-[9px] text-gray-600 uppercase">REQ:</span>
                                            <input type="number" value="${s.req}" onchange="updateReq('${s.id}', this.value)" class="w-8 text-[10px] text-center p-0 bg-transparent border-none">
                                        </div>
                                    </div>
                                    <div ondrop="drop(event, '${s.id}')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"
                                         class="drop-zone min-h-[40px] flex flex-wrap gap-1 p-1">
                                        ${assigned.map(a => `<div class="bg-green-500 text-black px-2 py-0.5 text-[10px] font-bold flex gap-2 items-center">
                                            ${a.name} (${a.count}) <span class="cursor-pointer" onclick="unassign('${s.id}', '${a.unitId}')">×</span>
                                        </div>`).join('')}
                                    </div>
                                    <div class="absolute bottom-0 left-0 h-0.5 bg-green-500" style="width: ${Math.min(100, (total/s.req)*100)}%; transition: width 0.5s;"></div>
                                    ${isUnder ? '<div class="absolute right-2 top-2 w-1 h-1 bg-red-500 rounded-full animate-ping"></div>' : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function removeUnit(id) { state.units = state.units.filter(u => u.id !== id); sync(true); }
        function removeTask(id) { state.tasks = state.tasks.filter(t => t.id !== id); sync(true); }
        function unassign(sId, uId) { state.assignments[sId] = state.assignments[sId].filter(a => a.unitId !== uId); sync(true); }
        function updateReq(sId, val) { state.tasks.forEach(t => t.shifts.forEach(s => { if(s.id === sId) s.req = parseInt(val); })); sync(true); }

        function printMode() {
            let win = window.open('', '_blank');
            let content = `
                <div style="font-family:sans-serif; direction:rtl; padding:20px;">
                    <h1 style="border-bottom:2px solid black;">לו"ז שיבוץ מבצעי - ${new Date().toLocaleDateString()}</h1>
                    ${state.tasks.map(t => `
                        <div style="margin-bottom:30px;">
                            <h2 style="background:#eee; padding:5px;">${t.name}</h2>
                            <table style="width:100%; border-collapse:collapse;" border="1">
                                <tr><th style="padding:10px;">משמרת</th><th style="padding:10px;">יחידות משובצות</th><th style="padding:10px;">סד"כ</th></tr>
                                ${t.shifts.map(s => {
                                    const assigned = state.assignments[s.id] || [];
                                    return `<tr>
                                        <td style="padding:10px; width:150px;">${s.label}</td>
                                        <td style="padding:10px;">${assigned.map(a => a.name).join(', ')}</td>
                                        <td style="padding:10px; width:80px; text-align:center;">${assigned.reduce((sum,a)=>sum+a.count,0)} / ${s.req}</td>
                                    </tr>`;
                                }).join('')}
                            </table>
                        </div>
                    `).join('')}
                </div>`;
            win.document.write(content);
            win.print();
        }

        // Auto Refresh every 30 seconds
        sync(false);
        setInterval(() => sync(false), 30000);

    </script>
</body>
</html>
