<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Platoon Scheduler</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
background:#050505;
color:#00ff88;
font-family:"JetBrains Mono", monospace;
margin:0;
}

header{
padding:15px 20px;
border-bottom:1px solid #003322;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-size:18px;
letter-spacing:2px;
}

button{
background:#001a11;
border:1px solid #00ff88;
color:#00ff88;
padding:6px 10px;
cursor:pointer;
}

button:hover{
background:#00ff88;
color:#000;
}

.panel{
border:1px solid #003322;
padding:12px;
margin-bottom:12px;
}

input,select{
background:#000;
border:1px solid #003322;
color:#00ff88;
padding:4px;
width:100%;
}

.grid{
display:grid;
grid-template-columns:300px 1fr;
gap:15px;
padding:15px;
}

.shift{
border:1px solid #003322;
margin-top:6px;
padding:6px;
}

.assigned{
background:#002b1a;
margin:3px;
padding:3px;
display:flex;
justify-content:space-between;
}

.warning{
color:#ff5555;
}

</style>
</head>

<body>

<header>
<h1>PLATOON OPS</h1>
<div>
<button onclick="exportCSV()">Export</button>
<button onclick="autoAssign()">Auto Assign</button>
</div>
</header>

<div class="grid">

<!-- LEFT PANEL -->
<div>

<div class="panel">

<h3>Units</h3>

<input id="unitName" placeholder="Unit name">
<input id="unitSize" type="number" placeholder="Size">

<button onclick="addUnit()">Add</button>

<div id="units"></div>

</div>


<div class="panel">

<h3>Rules</h3>

<label>Min rest hours</label>
<input id="restRule" type="number" value="4">

</div>

</div>


<!-- RIGHT PANEL -->
<div>

<div class="panel">

<h3>Create Mission</h3>

<input id="missionName" placeholder="Mission name">

<label>Start (optional)</label>
<input id="startTime" type="time">

<label>Duration (hours)</label>
<input id="duration" type="number" value="4">

<label>Number of shifts</label>
<input id="shiftCount" type="number" value="3">

<button onclick="createMission()">Create</button>

</div>

<div id="missions"></div>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxBPxQVbaXc9dfFp7oF9pMOTSTubJe7VgEfGNBJRbZaKwuTNp53nazEzvdv-hL03zIK/exec"

let state={
units:[],
missions:[],
assignments:{}
}

function save(){
localStorage.setItem("platoonState",JSON.stringify(state))
syncCloud()
render()
}

function load(){
const s=localStorage.getItem("platoonState")
if(s) state=JSON.parse(s)
}

async function syncCloud(){
try{
fetch(API_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(state)
})
}catch(e){}
}

function addUnit(){

const name=document.getElementById("unitName").value
const size=parseInt(document.getElementById("unitSize").value)

if(!name||!size) return

state.units.push({
id:"u"+Date.now(),
name,
size,
last:0
})

document.getElementById("unitName").value=""
document.getElementById("unitSize").value=""

save()
}

function createMission(){

const name=document.getElementById("missionName").value
const start=document.getElementById("startTime").value
const duration=parseInt(document.getElementById("duration").value)
const count=parseInt(document.getElementById("shiftCount").value)

if(!name) return

let shifts=[]

for(let i=0;i<count;i++){

let label="Shift "+(i+1)

if(start){

let t=new Date("1970-01-01T"+start)

t.setHours(t.getHours()+duration*i)

let end=new Date(t)
end.setHours(end.getHours()+duration)

label=t.getHours().toString().padStart(2,'0')+
":00-"+end.getHours().toString().padStart(2,'0')+":00"

}

shifts.push({
id:"s"+Date.now()+i,
label,
req:2
})

}

state.missions.push({
id:"m"+Date.now(),
name,
shifts
})

save()
}

function assign(shiftId){

const unitId=prompt("Unit ID")
const count=parseInt(prompt("Count"))

const unit=state.units.find(u=>u.id===unitId)

if(!unit) return

if(!state.assignments[shiftId])
state.assignments[shiftId]=[]

state.assignments[shiftId].push({
unitId,
count
})

save()

}

function autoAssign(){

const rest=parseInt(document.getElementById("restRule").value)

state.missions.forEach(m=>{
m.shifts.forEach(s=>{

if(!state.assignments[s.id])
state.assignments[s.id]=[]

let total=state.assignments[s.id].reduce((a,b)=>a+b.count,0)

while(total<s.req){

let unit=state.units.sort((a,b)=>a.last-b.last)[0]

state.assignments[s.id].push({
unitId:unit.id,
count:1
})

unit.last=Date.now()

total++

}

})
})

save()

}

function exportCSV(){

let csv="Mission,Shift,Unit,Count\n"

state.missions.forEach(m=>{
m.shifts.forEach(s=>{
let a=state.assignments[s.id]||[]

a.forEach(x=>{
let u=state.units.find(u=>u.id===x.unitId)

csv+=`${m.name},${s.label},${u.name},${x.count}\n`
})

})
})

const blob=new Blob([csv])
const link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="schedule.csv"
link.click()

}

function render(){

document.getElementById("units").innerHTML=
state.units.map(u=>`
<div>${u.name} (${u.size}) <small>${u.id}</small></div>
`).join("")

document.getElementById("missions").innerHTML=
state.missions.map(m=>`

<div class="panel">

<h3>${m.name}</h3>

${m.shifts.map(s=>{

let assigned=state.assignments[s.id]||[]
let total=assigned.reduce((a,b)=>a+b.count,0)

return `

<div class="shift">

<div>${s.label} | required: 
<input type="number" value="${s.req}" 
onchange="sReq('${s.id}',this.value)">

</div>

<div>

${assigned.map(a=>{
let u=state.units.find(x=>x.id===a.unitId)

return `<div class="assigned">${u.name} (${a.count})</div>`

}).join("")}

</div>

<button onclick="assign('${s.id}')">Assign</button>

</div>
`

}).join("")}

</div>

`).join("")

}

function sReq(id,val){

state.missions.forEach(m=>{
m.shifts.forEach(s=>{
if(s.id===id) s.req=parseInt(val)
})
})

save()
}

load()
render()

</script>

</body>
</html>
